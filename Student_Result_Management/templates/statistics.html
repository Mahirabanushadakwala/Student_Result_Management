<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Statistics</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500;600;700&family=Manrope:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>
<body>

<header class="app-header">
    <a href="/" class="brand"><i class="fa-solid fa-graduation-cap"></i> Student Result</a>
    <nav><a href="/dashboard"><i class="fa-solid fa-arrow-left"></i> Dashboard</a></nav>
</header>

<main class="page">
    <div class="page-inner">

        <h1 class="page-title"><i class="fa-solid fa-chart-line"></i> Student Statistics</h1>
        <p class="page-sub">A quick snapshot of your class records.</p>

        <div class="stat-grid">
            <div class="stat-card">
                <h2>Total Students</h2>
                <p>{{ total_students }}</p>
            </div>
            <div class="stat-card">
                <h2>Last Student Added</h2>
                <p style="font-size:1.3rem;">{{ last_student }}</p>
            </div>
            <div class="stat-card">
                <h2>Overall Average</h2>
                <p>{{ average }}%</p>
            </div>
        </div>

        <a href="/dashboard" class="back-link"><i class="fa-solid fa-arrow-left"></i> Back to Dashboard</a>

    </div>
</main>

<footer>
    <p>© 2026 Student Result Management System</p>
</footer>

</body>
</html>
